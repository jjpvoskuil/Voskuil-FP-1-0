name: EDGAR Full-Universe Cache Refresh

# Keeps the Market Screener's persistent EDGAR facts cache
# (edgar_facts_cache/shard_*.json) warm for the WHOLE ~6,000+ ticker
# "All US Common Stocks" universe, running outside the Streamlit Cloud
# app entirely.
#
# Why this job exists: the identical fetch logic (shared SEC rate
# limiter, connection-pooled Session, 2 requests/ticker) measured
# ~242 tickers/min as a bare script vs. ~75-130/min inside the
# deployed app — same code, same network, just much slower wall-clock
# when run inside the app's own process alongside its UI/websocket
# work. Rather than fighting that, the expensive full-universe fetch
# moved here. The in-app scan then mostly reads from this cache
# instead of live-fetching ~6,000 tickers every time someone runs it.
#
# Incremental: edgar_full_scan_cloud.py loads the existing cache first
# and only refetches entries older than the 7-day freshness window
# (edgar_scan_core.EDGAR_FACTS_CACHE_MAX_AGE_DAYS), so a normal
# scheduled run is much cheaper than a cold full scan. Daily cadence
# below keeps every entry well inside that same 7-day window, and once
# the cache is fully warm (no longer racing a second concurrent writer
# -- see the shard-write-race fix in edgar_scan_core.py/github_store.py)
# a normal day's run should mostly be cache hits, not a full re-fetch.

on:
  workflow_dispatch:
    inputs:
      force_refresh:
        description: 'Ignore the 7-day freshness window and refetch every ticker'
        required: false
        default: 'false'
      sample:
        description: 'Limit to first N tickers (testing only — leave blank for a real full run)'
        required: false
        default: ''
  schedule:
    # Daily 06:00 UTC (changed from weekly 2026-07-24, once the cache
    # was confirmed to hold a genuinely full, uncorrupted pass — see
    # SESSION_NOTES.md). Adjust as needed.
    - cron: '0 6 * * *'

jobs:
  refresh:
    runs-on: ubuntu-latest
    # Required: this repo's default Actions token permissions are
    # read-only, which was silently rejecting every shard write this
    # job made (confirmed via error: "403 Resource not accessible by
    # integration"). This grants write access to just this job's token,
    # without changing the repo-wide default for other workflows.
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install streamlit requests

      - name: Run full-universe EDGAR scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.force_refresh }}" = "true" ]; then
            ARGS="$ARGS --force-refresh"
          fi
          if [ -n "${{ github.event.inputs.sample }}" ]; then
            ARGS="$ARGS --sample ${{ github.event.inputs.sample }}"
          fi
          python edgar_full_scan_cloud.py $ARGS

      - name: Done
        run: echo "✅ EDGAR full-universe cache refresh complete"
