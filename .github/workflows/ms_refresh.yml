name: MS Data Refresh

on:
  workflow_dispatch:
    inputs:
      triggered_by:
        description: 'Who triggered this run'
        required: false
        default: 'manual'

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright openpyxl pandas requests
          playwright install chromium

      - name: Run MS download script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          MS_USERNAME: ${{ secrets.MS_USERNAME }}
          MS_PASSWORD: ${{ secrets.MS_PASSWORD }}
        run: python ms_download_cloud.py

      - name: Confirm files pushed
        run: |
          echo "✅ MS data refresh complete"
